<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>登录 · AWS.sb 面板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:#111;font-family:-apple-system,'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:40px;width:380px}
.logo{text-align:center;margin-bottom:32px}
.logo-icon{width:48px;height:48px;background:#111;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin:0 auto 12px;color:#fff}
.logo h1{font-size:18px;font-weight:600;color:#111}
.logo p{font-size:13px;color:#9ca3af;margin-top:4px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;color:#6b7280;margin-bottom:6px;font-weight:500}
input{width:100%;background:#fff;border:1px solid #e5e7eb;color:#111;padding:9px 12px;border-radius:7px;font-size:14px;outline:none;transition:border-color 0.15s}
input:focus{border-color:#111}
.btn{width:100%;background:#111;border:none;color:#fff;padding:10px;border-radius:7px;font-size:14px;font-weight:500;cursor:pointer;transition:background 0.15s;margin-top:8px}
.btn:hover{background:#333}
.error{color:#dc2626;font-size:13px;margin-top:10px;text-align:center;min-height:18px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">☁</div>
    <h1>AWS.sb 面板</h1>
    <p>IP 监控与自动换IP管理</p>
  </div>
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username"/>
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn" onclick="login()">登 录</button>
  <div class="error" id="error"></div>
</div>
<script>
document.addEventListener('keydown', e => { if(e.key==='Enter') login() });
async function login(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  if(!username||!password){document.getElementById('error').textContent='请填写用户名和密码';return}
  const resp = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
  const data = await resp.json();
  if(data.ok){location.href='/'}
  else{document.getElementById('error').textContent=data.error||'登录失败'}
}
</script>
</body>
</html>
